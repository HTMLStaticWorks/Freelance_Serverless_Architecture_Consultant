<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal Login | Serverless.IO</title>
  <meta name="description" content="Sign in to your serverless optimization workspace to track metrics and review designs.">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom CSS Stylesheets -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">

  <style>
    /* Unique Auth page styles */
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at 10% 10%, rgba(6, 182, 212, 0.05) 0%, transparent 40%),
                  radial-gradient(circle at 90% 90%, rgba(79, 70, 229, 0.05) 0%, transparent 40%),
                  var(--bg-color);
      position: relative;
      padding: 24px;
    }

    /* Fixed top-right controls container - COMPLETELY outside of the auth card to prevent touching on mobile */
    .auth-controls {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 12px;
      z-index: 1000;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      box-shadow: var(--shadow-lg);
      text-align: center;
      position: relative;
      overflow: hidden;
      margin-top: 40px; /* Leave space so controls never touch card on 360px */
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, var(--accent-color), var(--secondary-color));
    }

    .auth-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      margin-bottom: 30px;
    }

    .auth-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .auth-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      color: var(--text-muted);
    }

    .form-input-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .form-input-container i {
      position: absolute;
      left: 16px;
      color: var(--text-muted);
    }

    .form-input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      background: var(--bg-card);
      color: var(--text-heading);
      outline: none;
      transition: all var(--transition-fast);
    }

    .form-input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
    }

    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      margin-bottom: 24px;
    }

    .social-auth {
      margin-top: 32px;
      border-top: 1px solid var(--border-color);
      padding-top: 24px;
    }

    .social-auth-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 16px;
      position: relative;
    }

    .social-auth-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .social-auth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 12px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .social-auth-btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .auth-card a:hover {
      text-decoration: underline;
      opacity: 0.8;
    }

    .auth-brand:hover {
      opacity: 0.8;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      filter: brightness(1.1);
    }

    /* Small screens safeguards */
    @media (max-width: 360px) {
      .auth-card {
        padding: 24px 16px;
        margin-top: 60px; /* Guarantee vertical spacing for top fixed header toggles */
      }
      .auth-title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- FLOATING OUTSIDE TOGGLES (NEVER TOUCHING AUTH CARDS) -->
  <div class="auth-controls">
    <button class="rtl-toggle" aria-label="Toggle RTL">RTL</button>
    <button class="theme-toggle" aria-label="Toggle Theme"><i class="fas fa-moon"></i></button>
  </div>

  <!-- AUTH MAIN CARD -->
  <div class="auth-card">
    <div class="auth-brand" onclick="window.location.href='../index.html'">
      <div class="logo-icon"><i class="fas fa-bolt"></i></div>
      <span class="logo-text">Serverless.IO</span>
    </div>

    <h2 class="auth-title">Login</h2>
    <p class="auth-subtitle">Access your client design dashboard</p>

    <form id="login-form" action="dashboard.html" method="GET">
      <div class="form-group">
        <label for="login-email">Email Address *</label>
        <div class="form-input-container">
          <i class=""></i>
          <input type="email" id="login-email" required placeholder="" class="form-input">
        </div>
      </div>

      <div class="form-group">
        <label for="login-password">Password *</label>
        <div class="form-input-container">
          <i class=""></i>
          <input type="password" id="login-password" required placeholder="" class="form-input" style="padding-right: 40px;">
          <!-- Show/Hide eye icon -->
          <i class="fas fa-eye" id="toggle-pwd" style="left: auto; right: 16px; cursor: pointer;"></i>
        </div>
      </div>

      <div class="remember-forgot">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-muted);">
          <input type="checkbox" style="width: 16px; height: 16px; accent-color: var(--accent-color);"> Remember Me
        </label>
        <a href="404.html" style="color: var(--accent-color); font-weight: 600;">Forgot Password?</a>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    </form>

    <div class="social-auth">
      <div class="social-auth-title">Or Continue With</div>
      <div class="social-auth-buttons">
        <button class="social-auth-btn" onclick="window.location.href='dashboard.html'" style="background: #ffffff; color: #1f2937; border-color: #e2e8f0;">
          <i class="fab fa-google" style="color: #4285f4;"></i> Continue with Google
        </button>
        <button class="social-auth-btn" onclick="window.location.href='dashboard.html'" style="background: #000000; color: #ffffff; border-color: #000000;">
          <i class="fab fa-apple"></i> Continue with Apple
        </button>
      </div>
    </div>

    <p style="margin-top: 32px; font-size: 0.9rem; color: var(--text-muted);">Don't have an account? <a href="register.html" style="color: var(--accent-color); font-weight: 600;">Create Client Account</a></p>
  </div>

  <!-- Scripts -->
  <script src="../assets/js/main.js"></script>
  <script>
    // Local show-hide password toggle
    const togglePwd = document.getElementById('toggle-pwd');
    const pwdInput = document.getElementById('login-password');
    if (togglePwd && pwdInput) {
      togglePwd.addEventListener('click', () => {
        const type = pwdInput.getAttribute('type') === 'password' ? 'text' : 'password';
        pwdInput.setAttribute('type', type);
        togglePwd.className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
      });
    }
  </script>
</body>
</html>
