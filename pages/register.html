<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Client Account | Serverless.IO</title>
  <meta name="description" content="Sign up for a workspace at Serverless.IO to optimize your serverless pipeline budgets and download template packs.">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom CSS Stylesheets -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">

  <style>
    /* Unique Auth page styles */
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at 10% 10%, rgba(6, 182, 212, 0.05) 0%, transparent 40%),
                  radial-gradient(circle at 90% 90%, rgba(79, 70, 229, 0.05) 0%, transparent 40%),
                  var(--bg-color);
      position: relative;
      padding: 24px;
    }

    /* Fixed top-right controls container - COMPLETELY outside of the auth card to prevent touching on mobile */
    .auth-controls {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 12px;
      z-index: 1000;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      box-shadow: var(--shadow-lg);
      text-align: center;
      position: relative;
      overflow: hidden;
      margin-top: 40px; /* Guarantee that card never touches header menu toggles on 360px */
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, var(--accent-color), var(--secondary-color));
    }

    .auth-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      margin-bottom: 30px;
    }

    .auth-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .auth-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      color: var(--text-muted);
    }

    .form-input-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      background: var(--bg-card);
      color: var(--text-heading);
      outline: none;
      transition: all var(--transition-fast);
    }

    .form-input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
    }

    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      margin-bottom: 24px;
    }

    .social-auth {
      margin-top: 32px;
      border-top: 1px solid var(--border-color);
      padding-top: 24px;
    }

    .social-auth-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 16px;
      position: relative;
    }

    .social-auth-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .auth-card a:hover {
      text-decoration: underline;
      opacity: 0.8;
    }

    .auth-brand:hover {
      opacity: 0.8;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      filter: brightness(1.1);
    }

    /* Small screens safeguards */
    @media (max-width: 360px) {
      .auth-controls {
        position: absolute;
        top: 15px;
        right: 15px;
      }
      .auth-card {
        padding: 24px 16px;
        margin-top: 60px; /* Guarantee vertical spacing for top header toggles */
      }
      .auth-title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- FLOATING OUTSIDE TOGGLES (NEVER TOUCHING AUTH CARDS) -->
  <div class="auth-controls">
    <button class="rtl-toggle" aria-label="Toggle RTL">RTL</button>
    <button class="theme-toggle" aria-label="Toggle Theme"><i class="fas fa-moon"></i></button>
  </div>

  <!-- AUTH MAIN CARD -->
  <div class="auth-card">
    <div class="auth-brand" onclick="window.location.href='../index.html'">
      <div class="logo-icon"><i class="fas fa-bolt"></i></div>
      <span class="logo-text">Serverless.IO</span>
    </div>

    <h2 class="auth-title">Register</h2>
    <p class="auth-subtitle">Create your developer workspace portal</p>

    <form id="register-form" action="dashboard.html" method="GET">
      <div class="form-group">
        <label for="reg-name">Full Representative Name *</label>
        <div class="form-input-container">
          <input type="text" id="reg-name" required placeholder="" class="form-input">
        </div>
      </div>

      <div class="form-group">
        <label for="reg-email">Corporate Email Address *</label>
        <div class="form-input-container">
          <input type="email" id="reg-email" required placeholder="" class="form-input">
        </div>
      </div>

      <div class="form-group">
        <label for="reg-password">Create Password *</label>
        <div class="form-input-container">
          <input type="password" id="reg-password" required placeholder="" class="form-input" style="padding-right: 44px;">
          <!-- Show/Hide eye icon -->
          <i class="fas fa-eye toggle-password" data-target="reg-password"></i>
        </div>
      </div>

      <div class="form-group">
        <label for="reg-confirm-password">Confirm Password *</label>
        <div class="form-input-container">
          <input type="password" id="reg-confirm-password" required placeholder="" class="form-input" style="padding-right: 44px;">
          <!-- Show/Hide eye icon -->
          <i class="fas fa-eye toggle-password" data-target="reg-confirm-password"></i>
        </div>
      </div>

      <div class="remember-forgot">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-muted); text-align: left;">
          <input type="checkbox" required style="width: 16px; height: 16px; accent-color: var(--accent-color);"> I agree to the terms and Privacy Rules
        </label>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;"><i class="fas fa-user-plus"></i> Create Studio Account</button>
    </form>

    <div class="social-auth">
      <div class="social-auth-title">Or Register With</div>
      <div class="social-auth-buttons">
        <button class="social-auth-btn" onclick="window.location.href='dashboard.html'">
          <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo"> Continue with Google
        </button>
        <button class="social-auth-btn" onclick="window.location.href='dashboard.html'">
          <i class="fab fa-apple apple-icon"></i> Continue with Apple
        </button>
      </div>
    </div>

    <p style="margin-top: 32px; font-size: 0.9rem; color: var(--text-muted);">Already have an account? <a href="login.html" style="color: var(--accent-color); font-weight: 600;">Sign In Instead</a></p>
  </div>

  <!-- Scripts -->
  <script src="../assets/js/main.js"></script>
  <script>
    // Unified show-hide password toggle for multiple fields
    document.querySelectorAll('.toggle-password').forEach(toggle => {
      toggle.addEventListener('click', function() {
        const targetId = this.getAttribute('data-target');
        const input = document.getElementById(targetId);
        
        if (input.type === 'password') {
          input.type = 'text';
          this.classList.remove('fa-eye');
          this.classList.add('fa-eye-slash');
        } else {
          input.type = 'password';
          this.classList.remove('fa-eye-slash');
          this.classList.add('fa-eye');
        }
      });
    });

    // Simple password match validation
    const form = document.getElementById('register-form');
    const pwd = document.getElementById('reg-password');
    const confirmPwd = document.getElementById('reg-confirm-password');

    form.addEventListener('submit', (e) => {
      if (pwd.value !== confirmPwd.value) {
        e.preventDefault();
        alert('Passwords do not match. Please check and try again.');
      }
    });
  </script>
</body>
</html>
